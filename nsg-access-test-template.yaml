apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nsg-access-control-test
  title: TEST - NSG Access Control Guardrail
  description: >
    Minimal test template for verifying group-based access control.
    No resources are created. Fails if the caller is not a member of the required group.
  tags:
    - test
    - access-control
  annotations:
    custom/visible: 'false'
    custom/access-group: data
spec:
  owner: group:royalmail/data
  type: test

  parameters:
    - title: Access Control Test
      description: >
        This template verifies the group membership guardrail.
        No Azure resources or repositories will be created.
      properties:
        testNote:
          title: Test note (optional)
          type: string
          ui:widget: textarea
          ui:placeholder: 'e.g., Testing ALLOW rights'

  steps:

    - id: fetch-access-group
      name: Fetch access control group
      action: catalog:fetch
      input:
        entityRef: group:royalmail/data

    - id: check-access-group
      name: Verify caller is authorised
      action: roadiehq:utils:jsonata
      input:
        data:
          relations: ${{ steps['fetch-access-group'].output.entity.relations }}
          userRef: ${{ user.ref }}
          groupRef: ${{ steps['fetch-access-group'].output.entity.metadata.namespace }}:${{ steps['fetch-access-group'].output.entity.metadata.name }}
        expression: |
          (
            $ur := userRef;
            $gr := groupRef;
            $count(relations[type = "hasMember" and $lowercase(targetRef) = $lowercase($ur)]) > 0
              ? { "authorized": true, "user": $ur }
              : $error("Access denied: " & $ur & " is not a member of " & $gr & ". Contact the DevOps team to request access.")
          )

    - id: confirm-access
      name: Confirm access granted
      action: debug:log
      input:
        message: "Access granted for ${{ user.ref }}"

  output:
    text:
      - title: Result
        content: "**Access granted** for `${{ user.ref }}`"
